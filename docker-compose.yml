version: "3.9"

services:
  yoga-app:
    build: .
    container_name: yoga_pose_app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-yoga_ml_secret_key_change_in_prod}
      - DATABASE_PATH=/app/data/yoga_app.db
    volumes:
      - yoga_data:/app/data
      - ./static/reference_poses:/app/static/reference_poses
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  yoga_data:

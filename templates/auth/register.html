<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Register — YogaAI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
  <nav class="navbar">
  <div class="nav-brand">YogaAI</div>
  <div class="nav-links">
    <a href="/auth/login">Login</a>
    <a href="/auth/register">Register</a>
  </div>
</nav>

  <div class="auth-page">
    <div class="auth-card">
      <h2>Create account</h2>
      <p style="color:#888;margin-bottom:1.5rem">Start your yoga journey today</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" required/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required minlength="6"/>
        </div>
        <div class="form-group">
          <label>Weight (kg)</label>
          <input type="number" name="weight" value="65" min="30" max="200"/>
        </div>
        <button type="submit" class="btn-primary" style="width:100%;margin-top:1rem">
          Create account
        </button>
      </form>

      <p style="text-align:center;margin-top:1rem;color:#888;font-size:0.9rem">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" style="color:#7c6af5">Log in</a>
      </p>
    </div>
  </div>
</body>
</html>

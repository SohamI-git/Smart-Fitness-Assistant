<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Practice — YogaAI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">YogaAI</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/practice">Practice</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/video_upload">Upload Video</a>
            <a href="{{ url_for('auth.logout') }}" style="color:#e05252">Logout</a>
        </div>
    </nav>

  <div class="practice-layout">

    <!-- Left panel: webcam -->
    <div class="camera-panel">
      <div class="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <img id="processed-frame" alt="Processed frame"/>
      </div>
      <div class="camera-controls">
        <button id="btn-start"  class="btn-primary"   onclick="startCamera()">Start Camera</button>
        <button id="btn-stop"   class="btn-danger"    onclick="stopCamera()"   disabled>Stop</button>
        <button id="btn-reset"  class="btn-secondary" onclick="resetSession()">Reset Session</button>
      </div>

      <!-- Reference image panel — shown when pose doesn't match -->
      <div id="reference-panel" class="reference-panel" style="display:none">
        <div class="reference-header">
          <span id="reference-title">Reference pose</span>
          <span id="reference-badge" class="badge-wrong">Pose not matching</span>
        </div>
        <div class="reference-body">
          <div class="reference-img-wrap">
            <img id="reference-img" src="" alt="Reference pose"/>
            <div id="reference-placeholder" class="reference-placeholder">
              No reference image available
            </div>
          </div>
          <div id="reference-tips" class="reference-tips"></div>
        </div>
      </div>
    </div>

    <!-- Right panel -->
    <div class="info-panel">

      <!-- Settings -->
      
      <div class="panel-card">
        <h3>Settings</h3>
        <div class="setting-row">
          <label>Weight (kg)</label>
          <input type="number" id="weight" value="{{ current_user.weight_kg }}"
                min="30" max="200" style="width:80px"/>
        </div>
        <div class="setting-row">
          <label>Target pose</label>
          <select id="target-pose" onchange="onTargetPoseChanged()">
            <option value="">— Auto detect —</option>
            {% for cls in classes %}
            <option value="{{ cls }}">{{ cls | replace('_',' ') | title }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Voice feedback settings -->
        <div style="border-top:1px solid #2d2d3a;margin-top:0.8rem;padding-top:0.8rem">
          <div class="setting-row">
            <label>Voice feedback</label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
              <span class="toggle-track-small" id="voice-toggle-track">
                <input type="checkbox" id="voice-enabled" checked
                      onchange="toggleVoice(this.checked)"
                      style="position:absolute;opacity:0;width:100%;height:100%;
                              cursor:pointer;margin:0"/>
                <span class="toggle-thumb-small"></span>
              </span>
              <span id="voice-status-label" style="font-size:0.85rem;color:#4caf8a">On</span>
            </label>
          </div>
          <div class="setting-row">
            <label>Voice speed</label>
            <input type="range" id="voice-speed" min="0.6" max="1.4"
                  step="0.1" value="0.9" style="width:100px"/>
            <span id="voice-speed-label" style="font-size:0.8rem;color:#888;
                  min-width:24px">0.9x</span>
          </div>
          <div class="setting-row">
            <label>Volume</label>
            <input type="range" id="voice-volume" min="0" max="1"
                  step="0.1" value="0.8" style="width:100px"/>
            <span id="voice-volume-label" style="font-size:0.8rem;color:#888;
                  min-width:24px">80%</span>
          </div>
          <div class="setting-row">
            <label>Feedback mode</label>
            <select id="feedback-mode" style="font-size:0.85rem">
              <option value="full">Full — pose + corrections</option>
              <option value="corrections">Corrections only</option>
              <option value="pose">Pose name only</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Detection -->
      <div class="panel-card">
        <h3>Detected pose</h3>
        <div id="pose-name" class="pose-name">—</div>
        <div id="confidence-bar-wrap">
          <div id="confidence-bar" class="confidence-bar"></div>
          <span id="confidence-text">0%</span>
        </div>
        <div id="top3-list" class="top3-list"></div>
      </div>

      <!-- Correctness -->
      <div class="panel-card">
        <h3>Pose score</h3>
        <div id="score-display" class="score-display">—</div>
        <div id="corrections-list" class="corrections-list"></div>
      </div>

      <!-- Calories -->
      <div class="panel-card">
        <h3>Session calories</h3>
        <div id="calories-display" class="calories-display">0.000 kcal</div>
        <div id="pose-timer" class="pose-timer">Hold time: 0s</div>
        <div id="calorie-status" class="calorie-status"></div>
        <button class="btn-primary" style="margin-top:10px;width:100%"
                onclick="logCurrentPose()">Log this pose</button>
      </div>

      <!-- Session log -->
      <div class="panel-card">
        <h3>Session log</h3>
        <div id="session-log" class="session-log">No poses logged yet.</div>
      </div>

    </div>
  </div>

  <script src="{{ url_for('static', filename='js/practice.js') }}"></script>
</body>
</html>
